<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="CromCalc 2026 — Calculadora de orçamento para serviços de cromagem e retífica de peças cilíndricas">
    <meta name="theme-color" content="#FF6B00">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>CromCalc 2026</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon-192.png">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-content">
                <div class="logo-section">
                    <div class="logo-icon">
                        <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="20" cy="20" r="18" stroke="url(#grad1)" stroke-width="3" fill="none"/>
                            <circle cx="20" cy="20" r="10" stroke="url(#grad1)" stroke-width="2" fill="none" stroke-dasharray="4 3"/>
                            <line x1="20" y1="2" x2="20" y2="38" stroke="url(#grad1)" stroke-width="1.5" opacity="0.4"/>
                            <line x1="2" y1="20" x2="38" y2="20" stroke="url(#grad1)" stroke-width="1.5" opacity="0.4"/>
                            <defs>
                                <linearGradient id="grad1" x1="0" y1="0" x2="40" y2="40">
                                    <stop offset="0%" stop-color="#FF6B00"/>
                                    <stop offset="100%" stop-color="#FF9500"/>
                                </linearGradient>
                            </defs>
                        </svg>
                    </div>
                    <div class="logo-text">
                        <h1>CromCalc</h1>
                        <span class="logo-year">2026</span>
                    </div>
                </div>
                <span class="header-subtitle">Cromagem & Retífica</span>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Input Section -->
            <section class="input-section">
                <div class="section-label">
                    <span class="label-icon">📐</span>
                    <span>Dimensões da Peça</span>
                </div>
                
                <div class="input-grid">
                    <div class="input-group">
                        <label for="diametro">
                            <span class="input-symbol">Ø</span> Diâmetro
                        </label>
                        <div class="input-wrapper">
                            <input type="number" id="diametro" inputmode="decimal" placeholder="0" min="0" step="any" autocomplete="off">
                            <span class="input-unit">mm</span>
                        </div>
                        <div class="quick-select" id="quick-diametro">
                            <button data-value="10">10</button>
                            <button data-value="20">20</button>
                            <button data-value="30">30</button>
                            <button data-value="40">40</button>
                            <button data-value="50">50</button>
                            <button data-value="60">60</button>
                            <button data-value="80">80</button>
                            <button data-value="100">100</button>
                            <button data-value="150">150</button>
                            <button data-value="200">200</button>
                        </div>
                    </div>
                    
                    <div class="input-group">
                        <label for="comprimento">
                            <span class="input-symbol">ℓ</span> Comprimento
                        </label>
                        <div class="input-wrapper">
                            <input type="number" id="comprimento" inputmode="decimal" placeholder="0" min="0" step="any" autocomplete="off">
                            <span class="input-unit">mm</span>
                        </div>
                        <div class="quick-select" id="quick-comprimento">
                            <button data-value="100">100</button>
                            <button data-value="200">200</button>
                            <button data-value="300">300</button>
                            <button data-value="500">500</button>
                            <button data-value="750">750</button>
                            <button data-value="1000">1000</button>
                            <button data-value="1500">1500</button>
                            <button data-value="2000">2000</button>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Service Type Section -->
            <section class="service-section">
                <div class="section-label">
                    <span class="label-icon">⚙️</span>
                    <span>Tipo de Serviço</span>
                </div>
                
                <div class="service-grid" id="service-buttons">
                    <button class="service-btn active" data-service="cromoCamada">
                        <span class="service-name">Cromo Camada</span>
                    </button>
                    <button class="service-btn" data-service="cromagemCliente">
                        <span class="service-name">Cromagem Cliente</span>
                    </button>
                    <button class="service-btn" data-service="retifica">
                        <span class="service-name">Retífica</span>
                    </button>
                    <button class="service-btn" data-service="mecanico">
                        <span class="service-name">Mecânico</span>
                    </button>
                </div>
            </section>

            <!-- Results Section -->
            <section class="results-section" id="results-section">
                <div class="section-label">
                    <span class="label-icon">📊</span>
                    <span>Resultados</span>
                </div>

                <div class="info-results">
                    <div class="info-card">
                        <span class="info-label">Área</span>
                        <span class="info-value" id="result-area">—</span>
                        <span class="info-unit">dcm²</span>
                    </div>
                    <div class="info-card">
                        <span class="info-label">Peso</span>
                        <span class="info-value" id="result-peso">—</span>
                        <span class="info-unit">kg</span>
                    </div>
                    <div class="info-card">
                        <span class="info-label">Faixa</span>
                        <span class="info-value" id="result-faixa">—</span>
                        <span class="info-unit">&nbsp;</span>
                    </div>
                    <div class="info-card">
                        <span class="info-label">Valor Base</span>
                        <span class="info-value" id="result-base">—</span>
                        <span class="info-unit">R$</span>
                    </div>
                </div>

                <!-- Price Display -->
                <div class="price-display" id="price-display">
                    <span class="price-label">PREÇO FINAL</span>
                    <div class="price-value-wrapper">
                        <span class="price-currency">R$</span>
                        <span class="price-value" id="result-preco">0,00</span>
                    </div>
                    <span class="price-service" id="price-service-label">Cromo Camada</span>
                </div>
            </section>

            <!-- Clear Button -->
            <button class="clear-btn" id="clear-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                </svg>
                Limpar / Novo Cálculo
            </button>
        </main>

        <!-- Footer -->
        <footer class="app-footer">
            <span>CromCalc 2026 — Megaflex</span>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
